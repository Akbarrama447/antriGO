<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AntriGo - Takeaway</title>
    <link rel="stylesheet" href="takeaway.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <button class="back-btn" onclick="history.back()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            <div class="header-logo">
                <svg class="fork-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7zm5-3v8h2.5v8H21V2c-2.76 0-5 2.24-5 4z"/>
                </svg>
                <span>AntriGo</span>
            </div>
            <div class="header-spacer"></div>
        </header>

        <main class="main-content">
            <div class="takeaway-card">
                <div class="icon-wrapper">
                    <svg class="bag-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M6 11h12l1 9H5z"></path>
                        <path d="M9 11V6a3 3 0 0 1 6 0v5"></path>
                    </svg>
                </div>
                <h1 class="main-title">Takeaway Order</h1>
                <p class="subtitle">Enter your name so we can prepare your pickup order.</p>

                <div class="input-group">
                    <label class="input-label" for="customerName">Your Name</label>
                    <input type="text" id="customerName" class="text-input" placeholder="e.g. John Doe" maxlength="50">
                </div>

                <button class="btn-start" onclick="startOrdering()">
                    <span>Start Ordering</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </div>
        </main>
    </div>

    <script>
        function startOrdering() {
            const nameInput = document.getElementById('customerName');
            const name = nameInput.value.trim() || 'Guest';

            localStorage.setItem('orderType', 'takeaway');
            localStorage.setItem('customerName', name);
            window.location.href = 'menu.html';
        }
    </script>
</body>
</html>
